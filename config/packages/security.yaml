# config/packages/security.yaml
security:

    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider

            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: event_index
                username_parameter: username
                password_parameter: password
                enable_csrf: true             # ← token CSRF automatique sur le login

            # ── Protection brute-force : max 3 tentatives / minute par IP+login ──
            login_throttling:
                max_attempts: 3
                interval: '1 minute'

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800             # 7 jours
                path: /
                name: REMEMBER_ME
                secure: false               # passer à true en production (HTTPS)
                httponly: true

            logout:
                path: app_logout
                target: event_index

    access_control:
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/, roles: PUBLIC_ACCESS }