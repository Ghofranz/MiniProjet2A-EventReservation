services:
  app:
    build: .
    container_name: eventres_app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
      -mailp
    environment:
      DATABASE_URL: "mysql://root:root@db:3306/event_reservation_db?serverVersion=10.4.32-MariaDB&charset=utf8mb4"
      MAILER_DSN: "smtp://mailpit:1025"

  db:
    image: mariadb:10.4
    container_name: eventres_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: event_reservation_db
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
  mailpit:
    image: axllent/mailpit
    container_name: eventres_mail
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
volumes:
  db_data:
